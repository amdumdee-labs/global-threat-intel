      business_justification: "65% of enterprise AI agents are unused but hold
        live access credentials. These are the AI equivalent of orphaned service
        accounts — a known vulnerability category that has preceded significant
        breaches. The difference is scale: AI agent proliferation means this
        category is growing faster than any prior machine identity problem."
      cost_estimate: "AI agent credential audit and governance program: $20K-$60K.
        Secrets management platform for agent credentials if not already deployed:
        $30K-$100K annually. Cost of compromised broad-scope agent credential:
