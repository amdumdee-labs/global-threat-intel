  attack_indicators:
    - "Unexpected outbound connections from firewall management interfaces"
    - "Anomalous process spawning in Node.js application environments"
    - "child_process module activity in applications that should not invoke it"
    - "Unusual AI inference routing patterns or model substitution events"
    - "SIEM alerts on User-ID portal access from untrusted IP ranges"

