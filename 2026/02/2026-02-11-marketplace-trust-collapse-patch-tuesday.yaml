---
threat_summary:
  title: "Marketplace Trust Collapse: Official Store Credential Theft,
    25M-Record Breach Expansion, and Six Exploited Windows Zero-Days"
  report_date: "2026-02-11"
  threat_id: "TI-20260211-001"
  severity_business: "Critical"
  severity_technical: "Critical"

  executive_summary: |
    February 11, 2026 produced three simultaneous high-severity disclosures
    that collectively expose a structural failure in how organizations trust
    approved software ecosystems. A malicious phishing kit operating inside
    Microsoft's official Outlook add-in store stole over 4,000 corporate
    credentials by claiming an abandoned developer's expired hosting URL —
    with no verification from Microsoft between the 2022 approval and the
    2026 discovery. The add-in had permission to read and modify user emails
    and was served from Microsoft's own marketplace as a trusted tool.

    Conduent's 2024 ransomware breach — disclosed incrementally over the
    past year — now affects a confirmed 25 million individuals, including
    nearly 17,000 Volvo Group North America employees whose Social Security
    numbers, health data, and personal information were exposed. Major client
    organizations learned of their employees' exposure over a year after the
    initial compromise. Microsoft's February Patch Tuesday addressed six
    zero-day vulnerabilities, three actively exploited in the wild, including
    one used against US and Canadian organizations since December 24, 2025.

    The common thread across all three events: organizations are trusting
    systems, vendors, and tools based on approvals that were never designed
    to account for what happens after initial review. The attack surface is
    not what you haven't approved — it is everything you approved and stopped
    watching.

threat_intelligence:
  what_happened:
    incident_overview: |
      The AgreeTo Outlook add-in was submitted to Microsoft's Marketplace
      in December 2022, reviewed, and approved. The developer abandoned the
      project and deleted the Vercel deployment hosting the add-in's content.
      The manifest file continued pointing to the now-claimable URL. An
      attacker claimed the expired URL and deployed a phishing kit: a fake
      Microsoft login page, a credential capture script, an exfiltration
      channel via Telegram Bot API, and a redirect to the real Microsoft
      login page to prevent suspicion. Because Office add-ins load content
      live from a developer's server every time they are opened, every user
      who opened AgreeTo received the attacker's phishing page inside their
      Outlook sidebar — appearing as a legitimate Microsoft authentication
      prompt. Over 4,000 credential sets were stolen, along with credit card
      numbers and banking security answers.

      Conduent, a large business services provider that processes benefits,
      payments, and back-office services for government agencies and major
      corporations, suffered a ransomware attack beginning October 2024.
      The Safepay group claimed responsibility in February 2025. The breach
      has expanded through multiple disclosures: Texas alone now reports
      15 million affected individuals (up from an initial 4 million), Oregon
      reports 10 million, and Volvo Group North America confirmed nearly
      17,000 employee records compromised. Stolen data includes Social
      Security numbers, dates of birth, addresses, and health and insurance
      information. Volvo stated it only became aware of its employees'
      exposure in January 2026 — over a year after the initial compromise.

      Microsoft's February 2026 Patch Tuesday addressed 50+ vulnerabilities
      including six zero-days with confirmed in-the-wild exploitation.
      CVE-2026-21533 (Windows Remote Desktop Services elevation of privilege)
      had been actively used against US and Canadian organizations since at
      least December 24, 2025 — nearly seven weeks before the patch. Three
      additional zero-days allow attackers to bypass Windows security features
      via malicious files, and a RasMan service crash vulnerability can
      disable VPN connections enterprise-wide with no elevated privileges
      required.

    affected_organizations:
      - name: "Organizations with AgreeTo installed in Outlook"
        impact: "4,000+ credential sets stolen including corporate
          Microsoft accounts, credit card numbers, and banking security
          answers; email read/modify permission exposure"
      - name: "Volvo Group North America employees (16,991 individuals)"
        impact: "SSNs, health data, DOBs, and addresses exposed in
          Conduent breach; identity fraud and benefits fraud risk"
      - name: "25 million Conduent breach victims across Texas, Oregon,
          and multiple corporate clients"
        impact: "Full PII including SSNs and health insurance data
          stolen; ongoing identity protection liability for affected
          organizations"
      - name: "Enterprises running unpatched Windows environments"
        impact: "Active exploitation of six zero-days including
          privilege escalation and security bypass flaws used in
          attacks since December 2025"

    attack_methodology: |
      The AgreeTo attack exploits the structural gap between marketplace
      approval and ongoing content monitoring. Microsoft signs the manifest
      file once. The manifest declares a URL. Whatever that URL serves is
      what runs inside Outlook — forever, until the add-in is removed. The
      attacker needed only to claim an expired Vercel deployment to inherit
      the trust Microsoft granted in 2022. The phishing page appeared inside
      the official Outlook interface, indistinguishable from a legitimate
      re-authentication prompt. Credentials were exfiltrated in real time.

      The Conduent breach followed a standard ransomware pattern: extended
      dwell time (October 2024 through January 2025), bulk data exfiltration,
      and incremental public disclosure as affected clients discover their
      exposure. The multi-year gap between compromise and some clients'
      awareness demonstrates how third-party breach notification processes
      consistently fail downstream organizations.

      The six Windows zero-days span three attack categories: security
      feature bypasses (allowing malicious files to execute without warnings),
      privilege escalation (turning a standard user account into a SYSTEM-level
      attacker), and service disruption (crashing VPN services enterprise-wide).
      CVE-2026-21533 specifically allows an attacker who already has basic
      access to add themselves to the Administrator group — the critical
      post-compromise lateral movement step.

  why_it_matters:
    business_risks:
      financial_exposure: |
        AgreeTo's ReadWriteItem permission means the attacker could have
        accessed and exfiltrated entire mailbox contents — not just credentials.
        For organizations where email contains M&A discussions, financial
        data, or customer PII, this represents unbounded exposure. 4,000+
        stolen Microsoft account credentials provide access to Teams, SharePoint,
        OneDrive, and every integrated application. Conduent breach liability
        for downstream clients includes identity protection costs, notification
        obligations, and class action exposure. Average cost of a third-party
        breach: $4.29M (IBM 2024). SSN exposure creates 7-10 year fraud
        liability tail for affected individuals.

      regulatory_compliance: |
        AgreeTo credential theft triggering access to customer or employee
        data creates GDPR 72-hour notification obligation and CCPA duties.
        Conduent's SSN and health data exposure for Volvo employees triggers
        HIPAA breach notification if health plan data is confirmed. Texas and
        Oregon state breach notification laws apply to the 25 million affected
        residents. SEC material disclosure assessment required for public
        companies where executive email accounts were among AgreeTo victims.
        CISA's Binding Operational Directive requires federal agencies to
        patch the six February zero-days within mandated timelines.

      competitive_impact: |
        An attacker with ReadWriteItem permissions in executive Outlook accounts
        can read sent items, draft folders, and calendar invitations — providing
        complete intelligence on business negotiations, M&A activity, and
        strategic plans. For any organization where AgreeTo was installed on
        leadership accounts, the competitive exposure window is the entire
        period the malicious add-in was active. The Conduent breach demonstrates
        that outsourcing back-office functions transfers data risk without
        transferring accountability — a board-level vendor management failure.

      operational_disruption: |
        CVE-2026-21525 (RasMan denial of service) can crash VPN services
        enterprise-wide with a single non-privileged script. In environments
        using always-on VPN with fail-close policies, this simultaneously
        locks out remote employees AND prevents IT from remotely patching
        affected machines — creating a cascading operational failure that
        can take hours to resolve. Organizations with large remote workforces
        face disproportionate exposure. Credential rotation for 4,000+
        AgreeTo-affected accounts requires immediate IT mobilization and
        creates authentication disruption across all integrated services.

    industry_patterns:
      affected_sectors:
        - "Enterprise (all sectors using Microsoft 365 and Outlook)"
        - "Government and public sector (Conduent client base)"
        - "Healthcare and benefits administration"
        - "Automotive and manufacturing (Volvo)"
        - "Financial services"
        - "Any organization using third-party business process outsourcing"

      trend_analysis: |
        The AgreeTo attack is the first confirmed malicious add-in on
        Microsoft's official Marketplace, but the structural vulnerability —
        approve once, trust forever — exists across every marketplace that
        hosts remote dynamic dependencies. This pattern has been confirmed
        in npm packages, browser extensions, VS Code plugins, and now
        Outlook add-ins within a 90-day window. Third-party breach
        notification failures, as demonstrated by Conduent, are worsening
        as breach scope expands through incremental discovery. Both trends
        are accelerating.

