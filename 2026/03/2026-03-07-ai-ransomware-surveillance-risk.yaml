threat_summary:
  title: "AI-Driven Security, Ransomware Evolution, and Surveillance Infrastructure Risk"
  report_date: "2026-03-07"
  threat_id: "TI-20260307-041"
  severity_business: "Critical"
  severity_technical: "High"

  executive_summary: |
    Multiple March 2026 incidents highlight a major shift in cyber risk: attackers and defenders are both using automation, AI, and trusted infrastructure at unprecedented scale. OpenAI disclosed that its Codex Security platform identified over 10,000 high-severity software vulnerabilities across 1.2 million code commits, signaling the growing exposure of enterprise software supply chains.

    At the same time, ransomware groups linked to Velvet Tempest used social engineering, legitimate Windows utilities, and stealth malware delivery methods to infiltrate enterprise environments. Separately, the FBI confirmed investigation of suspicious activity involving systems storing sensitive surveillance and investigative information, while Iran-linked actors targeted internet-connected cameras across Israel and Gulf states for intelligence gathering and military assessment.

    Boards should treat these developments as evidence that operational visibility, supply chain governance, and infrastructure exposure are now interconnected business risks rather than isolated technical problems.

threat_intelligence:
  what_happened:
    incident_overview: |
      OpenAI launched Codex Security, an AI-powered vulnerability discovery platform capable of analyzing software repositories, validating vulnerabilities, and proposing remediation guidance. During beta operations, the system scanned more than 1.2 million commits and identified thousands of high-severity findings affecting major open-source projects including OpenSSH, Chromium, PHP, GnuTLS, and GnuPG.

      Researchers from MalBeacon observed Velvet Tempest ransomware operators conducting a multi-stage intrusion using fake CAPTCHA prompts and ClickFix social engineering techniques. Attackers leveraged legitimate administrative utilities, credential harvesting scripts, and malware loaders before staging the CastleRAT backdoor and infrastructure associated with Termite ransomware operations.

      The FBI disclosed investigation into suspicious activity impacting an internal system containing sensitive surveillance and investigative information. Although unclassified, the affected systems reportedly contained personally identifiable information and surveillance-related operational data.

      Check Point researchers additionally observed Iran-linked actors targeting vulnerable IP cameras across Israel and Gulf states. The activity likely supported reconnaissance, military intelligence collection, and battle damage assessment operations during heightened geopolitical tensions.

