        - "Retail"

      trend_analysis: |
        The incidents demonstrate a broader trend toward operational convergence between cyber espionage, ransomware, AI-assisted vulnerability discovery, and infrastructure targeting. Threat actors increasingly exploit trusted enterprise tools and unmanaged internet-facing assets instead of relying solely on traditional malware delivery.

